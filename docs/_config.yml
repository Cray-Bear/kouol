title: kouol
description: 一个完全由 AI 驱动开发的 HarmonyOS 教学项目
baseurl: "/kouol"
url: "https://cray-bear.github.io"

theme: jekyll-theme-minimal

markdown: kramdown
kramdown:
  input: GFM

plugins:
  - jekyll-relative-links
  - jekyll-titles-from-headings

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor

include:
  - _discussions

defaults:
  - scope:
      path: ""
    values:
      layout: default
